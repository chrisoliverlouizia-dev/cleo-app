<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Cleo Access</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
 margin:0;
 font-family:Arial,Helvetica,sans-serif;
 background:linear-gradient(160deg,#0b0f19,#111827,#1f2937);
 min-height:100vh;
 display:flex;
 justify-content:center;
 align-items:center;
 color:white;
}
.box{
 width:88%;
 max-width:380px;
 background:rgba(255,255,255,.04);
 border:1px solid rgba(255,255,255,.08);
 backdrop-filter:blur(14px);
 border-radius:26px;
 padding:30px;
 box-shadow:0 25px 60px rgba(0,0,0,.35);
}
.logo{
 text-align:center;
 font-size:32px;
 font-weight:700;
 margin-bottom:8px;
}
.sub{
 text-align:center;
 font-size:13px;
 opacity:.7;
 margin-bottom:24px;
}
input{
 width:100%;
 padding:15px;
 margin-bottom:14px;
 border:none;
 border-radius:14px;
 background:rgba(255,255,255,.08);
 color:white;
 box-sizing:border-box;
 outline:none;
}
button{
 width:100%;
 padding:15px;
 border:none;
 border-radius:14px;
 background:white;
 color:#111827;
 font-size:14px;
 font-weight:700;
 cursor:pointer;
 margin-top:5px;
}
.switch{
 margin-top:18px;
 text-align:center;
 font-size:13px;
 opacity:.8;
 cursor:pointer;
}
#msg{
 margin-top:18px;
 text-align:center;
 font-size:13px;
 color:#d1d5db;
}
</style>
</head>
<body>

<div class="box">
   <div class="logo">CLEO</div>
   <div class="sub">Private Wealth Access</div>

   <div id="authBox"></div>

   <div id="msg"></div>
</div>

<script src="login.js"></script>
</body>
</html>
